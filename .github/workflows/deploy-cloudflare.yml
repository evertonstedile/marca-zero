name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Export limpo só com arquivos versionados; sem .github, sem ignorados
      - name: Build clean site dir
        run: |
          mkdir _site
          git archive HEAD | tar -x -C _site
          rm -rf _site/.github

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy _site --project-name=marca-zero --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
