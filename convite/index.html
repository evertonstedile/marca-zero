<style>
  :root{ --bg:#04090A; --cream:#EFEFE5; --green:#99AC62; --green-l:#C8D890; --line:rgba(239,239,229,.16); --ease:cubic-bezier(.2,.7,.2,1) }
  *{ margin:0; padding:0; box-sizing:border-box }
  html,body{ height:100% }
  body{ background:var(--bg); color:var(--cream); font-family:'Sora',system-ui,sans-serif;
    min-height:100svh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
    -webkit-font-smoothing:antialiased; overflow:hidden; position:relative }
  body::after{ content:""; position:absolute; inset:0; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='240'%20height='240'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.9'%20numOctaves='2'%20stitchTiles='stitch'/%3E%3C/filter%3E%3Crect%20width='240'%20height='240'%20filter='url(%23n)'/%3E%3C/svg%3E") }
  main{ position:relative; max-width:560px }
  .spark{ width:2px; height:104px; margin:0 auto 44px;
    background:linear-gradient(180deg, transparent, var(--green-l) 32%, var(--green) 60%, transparent);
    transform:skewX(-16deg); animation:breath 3.6s var(--ease) infinite }
  @keyframes breath{ 0%,100%{ opacity:.4; transform:skewX(-16deg) scaleY(.92) } 50%{ opacity:.95; transform:skewX(-16deg) scaleY(1.04) } }
  .mark{ font-weight:300; font-size:clamp(1.5rem,4vw,2.2rem); letter-spacing:.34em; text-transform:uppercase }
  .mark span{ color:var(--green); font-weight:200; margin:0 .12em; opacity:.85 }
  .sub{ margin-top:20px; font-weight:300; font-size:clamp(.78rem,1.5vw,.92rem);
    letter-spacing:.26em; text-transform:uppercase; color:rgba(239,239,229,.62) }
  .enter{ display:inline-block; margin-top:52px; font-weight:400; font-size:.82rem;
    letter-spacing:.16em; text-transform:uppercase; text-decoration:none;
    color:#04090A; background:var(--green); border:1px solid var(--green-l);
    padding:16px 40px; border-radius:14px; transition:transform .3s var(--ease), background .3s var(--ease) }
  .enter:hover{ transform:translateY(-2px); background:var(--green-l) }
  .enter:focus-visible{ outline:none; box-shadow:0 0 0 3px rgba(200,216,144,.4) }
  @media (prefers-reduced-motion:reduce){ .spark{ animation:none } }
</style>

<body>
  <main>
    <div class="spark" aria-hidden="true"></div>
    <h1 class="mark">Marca<span>/</span>Zero</h1>
    <p class="sub">Método RAIZ · Mentoria individual</p>
    <a class="enter" href="https://marca-zero.evertonstedile.com.br/">Entrar</a>
  </main>
</body>
